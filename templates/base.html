<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI Form Assistant{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink:    #0d0d0d;
      --paper:  #f7f4ef;
      --cream:  #ede9e0;
      --accent: #c8502a;
      --accent2:#2a6cc8;
      --muted:  #7a7469;
      --card-bg:#ffffff;
      --border: #ddd8ce;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(13,13,13,.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar-brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; letter-spacing: -.5px; }
    .navbar { background: var(--ink) !important; border-bottom: 2px solid var(--accent); }
    .navbar-brand span { color: var(--accent); }
    .nav-link { color: rgba(255,255,255,.75) !important; font-size:.9rem; }
    .nav-link:hover { color: #fff !important; }

    /* ── Page wrapper ── */
    .page-wrapper { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    /* ── Section heading ── */
    .section-heading { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; letter-spacing: -1px; line-height: 1.1; }
    .section-heading .highlight { color: var(--accent); }
    .section-sub { color: var(--muted); font-size: .95rem; margin-top: .4rem; }

    /* ── Card ── */
    .form-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem 2.2rem;
    }

    /* ── Field group label ── */
    .field-group-label {
      font-family: 'Syne', sans-serif;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid var(--cream);
      padding-bottom: .4rem;
      margin-bottom: 1rem;
    }

    /* ── Form controls ── */
    .form-control, .form-select {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .92rem;
      padding: .6rem .9rem;
      background: var(--paper);
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(42,108,200,.12);
      background: #fff;
    }
    .form-control.is-valid   { border-color: #2d9e5f; }
    .form-control.is-invalid { border-color: var(--accent); }

    label.form-label { font-size: .85rem; font-weight: 500; margin-bottom: .3rem; }

    /* ── AI Suggestion panel ── */
    #ai-panel {
      background: linear-gradient(135deg, #0d0d0d 0%, #1e2a3a 100%);
      border-radius: var(--radius);
      padding: 1.4rem 1.6rem;
      color: #fff;
      position: sticky;
      top: 1.5rem;
    }
    #ai-panel .ai-title {
      font-family: 'Syne', sans-serif;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .8rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    #ai-panel .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.4; transform:scale(1.5); }
    }
    #ai-suggestion-text {
      font-size: .88rem;
      line-height: 1.7;
      color: rgba(255,255,255,.85);
      white-space: pre-wrap;
    }
    #ai-suggestion-text ul { padding-left: 1.2rem; }
    #ai-loading { display: none; }
    .spinner-sm { width: 1rem; height: 1rem; border-width: 2px; }

    /* ── Validation feedback ── */
    .valid-feedback, .invalid-feedback { font-size: .8rem; }

    /* ── Submit button ── */
    .btn-submit {
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      letter-spacing: .03em;
      padding: .75rem 2.2rem;
      border-radius: 8px;
      transition: transform .15s, box-shadow .15s, background .2s;
    }
    .btn-submit:hover {
      background: #a83e1f;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(200,80,42,.3);
    }

    /* ── Progress bar ── */
    .form-progress { height: 4px; border-radius: 4px; background: var(--cream); margin-bottom: 1.5rem; overflow: hidden; }
    .form-progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 4px; transition: width .4s ease; }

    /* ── Character counter ── */
    .char-counter { font-size: .75rem; color: var(--muted); text-align: right; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .section-heading { font-size: 1.5rem; }
      .form-card { padding: 1.4rem 1.2rem; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand text-white" href="{% url 'form' %}">
      <i class="bi bi-stars me-1" style="color:var(--accent)"></i>AI <span>FormAssist</span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'form' %}"><i class="bi bi-pencil-square me-1"></i>New Form</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'submissions' %}"><i class="bi bi-table me-1"></i>Submissions</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="page-wrapper">
  {% block content %}{% endblock %}
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
